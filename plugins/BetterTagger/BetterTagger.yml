name: BetterTagger
description: >-
  Scene tagger triage helpers: fingerprint match rate + tier colors, Save column alignment,
  optional-field / entity filename hints, and QA outline when performer source is missing.
version: 1.2.6
url: https://github.com/stashapp/CommunityScripts/tree/master/plugins/BetterTagger
ui:
  javascript:
    - BetterTaggerCore.js
    - BetterTagger.js
  css:
    - BetterTagger.css

settings:
  enableFingerprintQuality:
    displayName: Fingerprint Quality
    description: >-
      Show match percentage and tier-colored background on stash-box fingerprint summary lines.
    type: BOOLEAN
  enableSaveLayout:
    displayName: Pin Save Button
    description: >-
      Pin the Save action to the bottom of the right-hand column while the scene tagger is open.
    type: BOOLEAN
  enableMetadataMatchHints:
    displayName: Metadata filename matching
    description: >-
      Highlight optional fields and entity rows when values plausibly match the scene title and tagger query.
    type: BOOLEAN
  enableMissingPerformerQA:
    displayName: Missing Performer Warning
    description: >-
      Outline scene rows that show Save but have no Performer entity block in the stash-box panel.
    type: BOOLEAN
  enableSceneFileInfo:
    displayName: Scene drawer file info
    description: >-
      Add Scene File Info-style details (hashes/path/size/duration/codecs) into the tagger scene drawer.
    type: BOOLEAN
  enableSceneBadges:
    displayName: Scene badges
    description: >-
      Show scene badges for playcount, markers, groups, o-count, and organized state in tagger rows.
    type: BOOLEAN
  enableDebugLogging:
    displayName: Debug logging (console)
    description: >-
      Emit [BetterTagger] diagnostics for scrape/compare and save detection (enable while troubleshooting, then turn off).
    type: BOOLEAN
